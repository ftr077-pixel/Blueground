name: Airbnb visibility

# Runs the visibility tracker on a schedule (and on-demand).
# NOTE: scheduled/dispatch runs only fire once this file is on the DEFAULT
# branch (merge PR #4). It needs a repo secret named PROXY_URL (a residential
# proxy, e.g. http://user:pass@host:port) — cloud IPs get blocked by Airbnb.

on:
  workflow_dispatch: {}          # lets you click "Run" in the Actions tab
  schedule:
    - cron: "0 6 * * *"          # daily at 06:00 UTC — change as you like

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run visibility tracker
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper/airbnb_visibility.py | tee scraper/last_run.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visibility-output
          path: scraper/last_run.txt
